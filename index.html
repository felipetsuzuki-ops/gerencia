<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fazenda">
<meta name="theme-color" content="#2a5c1f">
<title>Gestao da Fazenda</title>
<link id="pwa-icon" rel="apple-touch-icon">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --g: #2a5c1f; --g2: #3d8530; --gl: #e8f5e2;
  --t: #9b6031; --tl: #fdf0e5;
  --a: #c8920a; --al: #fff8e0;
  --d: #d63031; --dl: #ffeaea;
  --b: #1a5ec8; --bl: #e3f0ff;
  --bg: #f2f4f0; --card: #fff;
  --tx: #1a1f16; --tx2: #6b7566; --tx3: #a8b0a2;
  --br: #e0e5db;
  --st: env(safe-area-inset-top, 44px);
  --sb: env(safe-area-inset-bottom, 20px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* AJUSTE PARA INTERFACE IGUAL (PC E CELULAR) */
html, body { 
  height: 100%; 
  background: #cbd5e1; 
  display: flex; 
  justify-content: center; 
  overflow: hidden; 
  font-family: -apple-system, system-ui, sans-serif; 
}

#app { 
  width: 100%; 
  max-width: 480px; /* Mantém formato de celular no PC */
  height: 100%; 
  background: var(--bg); 
  display: flex; 
  flex-direction: column; 
  position: relative; 
  box-shadow: 0 0 30px rgba(0,0,0,0.2);
}

.topbar { background: var(--g); padding: var(--st) 18px 14px; display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0; }
.tb-title { font-size: 21px; font-weight: 800; color: #fff; letter-spacing: -.4px; }

#pages { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
.page { display: none; }
.page.active { display: block; }

.card { background: var(--card); border-radius: 16px; box-shadow: 0 2px 14px rgba(0,0,0,.07); margin-bottom: 14px; padding: 16px; }
.btn { font-weight: 700; font-size: 15px; padding: 14px; border: none; border-radius: 12px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
.btn-g { background: var(--g); color: #fff; }
.btn-b { background: var(--b); color: #fff; }
.btn-xls { background: #1d6f42; color: #fff; }

.fi, .fsel, .fta { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid var(--br); border-radius: 10px; background: #f9f9f9; font-size: 15px; }
.fta { height: 80px; resize: none; font-family: inherit; }

.bnav { background: rgba(255,255,255,.97); border-top: 1px solid var(--br); display: flex; padding-bottom: var(--sb); flex-shrink: 0; }
.nb { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 4px; font-size: 10px; font-weight: 600; color: var(--tx3); background: none; border: none; cursor: pointer; }
.nb.active { color: var(--g); }
.ni { font-size: 20px; margin-bottom: 3px; }

#splash { position: absolute; inset: 0; z-index: 999; background: var(--g); display: flex; align-items: center; justify-content: center; transition: 0.4s; }
#splash.hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="app">
  <div id="splash">
    <div style="color: white; font-weight: bold; text-align: center;"><span style="font-size:40px">🚜</span><br>Fazenda Pro</div>
  </div>

  <div class="topbar">
    <div class="tb-title" id="tt">Painel</div>
  </div>

  <div id="pages">
    <div id="pg-dash" class="page active">
      <div class="card">
        <h3>Olá, Samuel</h3>
        <p id="info-dash" style="color:var(--tx2); margin-top:5px">Carregando informações do estoque...</p>
        <button class="btn btn-xls" onclick="exportarExcel()">📊 Extrair Estoque (Excel)</button>
      </div>
    </div>

    <div id="pg-compras" class="page">
      <div class="card" style="background: var(--bl);">
        <h4 style="color: var(--b)">⚡ Adicionar via Texto da Foto</h4>
        <p style="font-size: 11px; color: var(--b); margin-bottom: 5px;">Cole o texto copiado da foto da nota abaixo:</p>
        <textarea id="txt-foto-nota" class="fta" placeholder="Cole aqui o conteúdo da nota..."></textarea>
        <button class="btn btn-b" onclick="processarTextoDaFoto()">Processar e Salvar</button>
      </div>

      <div class="card">
        <h4>Importar Nota (XML)</h4>
        <input type="file" id="xmlNota" accept=".xml" style="display:none" onchange="importarNota()">
        <button class="btn btn-g" onclick="document.getElementById('xmlNota').click()">📄 Selecionar Arquivo XML</button>
      </div>
      <div id="lista-compras"></div>
    </div>

    <div id="pg-estoque" class="page">
      <div class="card">
        <h4>Baixa de Material</h4>
        <select id="sel-insumo-baixa" class="fsel"></select>
        <input type="number" id="qtd-uso-insumo" class="fi" placeholder="Quantidade usada">
        <button class="btn btn-g" onclick="confirmarBaixaEstoque()">Confirmar Uso</button>
      </div>
      <div id="lista-estoque-geral"></div>
    </div>

    <div id="pg-equipe" class="page">
      <div class="card">
        <h4>Atividade de Funcionário</h4>
        <input type="text" id="input-func-nome" class="fi" placeholder="Nome do Funcionário">
        <input type="text" id="input-func-tarefa" class="fi" placeholder="Tarefa (ex: Roçagem, Plantio)">
        <button class="btn btn-g" onclick="registrarAtividadeEquipe()">Salvar Atividade</button>
      </div>
      <div id="lista-atividades-equipe"></div>
    </div>
  </div>

  <nav class="bnav">
    <button class="nb active" onclick="navegarApp('dash', this, 'Painel')"><span class="ni">📊</span>Painel</button>
    <button class="nb" onclick="navegarApp('compras', this, 'Compras')"><span class="ni">🛒</span>Compras</button>
    <button class="nb" onclick="navegarApp('estoque', this, 'Estoque')"><span class="ni">📦</span>Estoque</button>
    <button class="nb" onclick="navegarApp('equipe', this, 'Equipe')"><span class="ni">👥</span>Equipe</button>
  </nav>
</div>

<script>
// BANCO DE DADOS (MANTENDO SEU PADRÃO)
var dadosFazenda = JSON.parse(localStorage.getItem('fazenda_dados_v1') || '{"compras":[], "baixas":[], "equipe":[]}');

function salvarDados() {
    localStorage.setItem('fazenda_dados_v1', JSON.stringify(dadosFazenda));
}

window.onload = function() {
    atualizarPainel();
    setTimeout(function() {
        var splash = document.getElementById('splash');
        if(splash) splash.classList.add('hide');
        gerarIconeApp(); 
    }, 1200);
};

function navegarApp(idPagina, botao, tituloHeader) {
    var paginas = document.getElementsByClassName('page');
    for(var i=0; i<paginas.length; i++) { paginas[i].classList.remove('active'); }
    
    var botoes = document.getElementsByClassName('nb');
    for(var j=0; j<botoes.length; j++) { botoes[j].classList.remove('active'); }
    
    document.getElementById('pg-' + idPagina).classList.add('active');
    botao.classList.add('active');
    document.getElementById('tt').innerText = tituloHeader;
    
    if(idPagina === 'compras') renderizarListaCompras();
    if(idPagina === 'estoque') renderizarEstoque();
    if(idPagina === 'equipe') renderizarEquipe();
}

// FUNÇÃO: PROCESSAR TEXTO DA FOTO (COPIAR E COLAR)
function processarTextoDaFoto() {
    var textoDigitado = document.getElementById('txt-foto-nota').value;
    if(textoDigitado === "") return;
    
    var linhasTexto = textoDigitado.split('\n');
    var contadorItens = 0;
    
    for(var i=0; i<linhasTexto.length; i++) {
        var linha = linhasTexto[i];
        var matchPreco = linha.match(/(\d+[\.,]\d{2})/);
        
        if(matchPreco && linha.length > 5) {
            var nomeProduto = linha.replace(matchPreco[0], '').trim().toUpperCase();
            dadosFazenda.compras.push({
                id: Date.now() + Math.random(),
                nome: nomeProduto,
                quantidade: 1,
                data: new Date().toLocaleDateString()
            });
            contadorItens++;
        }
    }
    
    salvarDados();
    renderizarListaCompras();
    document.getElementById('txt-foto-nota').value = "";
    alert(contadorItens + " itens adicionados ao sistema!");
}

// FUNÇÃO: IMPORTAR XML (MANTENDO SUA LÓGICA)
function importarNota() {
    var arquivo = document.getElementById("xmlNota").files[0];
    if(!arquivo) return;
    var leitor = new FileReader();
    leitor.onload = function(e) {
        var xmlPronto = new DOMParser().parseFromString(e.target.result, "text/xml");
        var itensXML = xmlPronto.getElementsByTagName("det");
        for(var i=0; i<itensXML.length; i++) {
            var nomeXML = itensXML[i].getElementsByTagName("xProd")[0]?.textContent || "PRODUTO";
            var qtdXML = parseFloat(itensXML[i].getElementsByTagName("qCom")[0]?.textContent || 0);
            dadosFazenda.compras.push({
                id: Date.now() + i,
                nome: nomeXML,
                quantidade: qtdXML,
                data: new Date().toLocaleDateString()
            });
        }
        salvarDados();
        renderizarListaCompras();
        alert("Nota Fiscal importada com sucesso!");
    };
    leitor.readAsText(arquivo);
}

function renderizarListaCompras() {
    var container = document.getElementById('lista-compras');
    container.innerHTML = "";
    var ultimasCompras = dadosFazenda.compras.slice(-10).reverse();
    
    for(var i=0; i<ultimasCompras.length; i++) {
        var item = ultimasCompras[i];
        var d = document.createElement('div');
        d.style.padding = "10px";
        d.style.borderBottom = "1px solid #eee";
        d.style.display = "flex";
        d.style.justifyContent = "space-between";
        d.innerHTML = "<span>"+item.nome+"</span><b>"+item.quantidade+" un</b>";
        container.appendChild(d);
    }
}

// FUNÇÃO: ESTOQUE E EXCEL
function renderizarEstoque() {
    var calculoSaldo = {};
    for(var i=0; i<dadosFazenda.compras.length; i++) {
        var c = dadosFazenda.compras[i];
        calculoSaldo[c.nome] = (calculoSaldo[c.nome] || 0) + c.quantidade;
    }
    for(var j=0; j<dadosFazenda.baixas.length; j++) {
        var b = dadosFazenda.baixas[j];
        if(calculoSaldo[b.nome]) { calculoSaldo[b.nome] -= b.quantidade; }
    }

    var selectInsumo = document.getElementById('sel-insumo-baixa');
    selectInsumo.innerHTML = "";
    var listaEstoque = document.getElementById('lista-estoque-geral');
    listaEstoque.innerHTML = "";

    for(var nomeItem in calculoSaldo) {
        var opt = document.createElement('option');
        opt.value = nomeItem;
        opt.innerText = nomeItem;
        selectInsumo.appendChild(opt);

        var cardEstoque = document.createElement('div');
        cardEstoque.className = "card";
        cardEstoque.innerHTML = "<div style='display:flex; justify-content:space-between'><span>"+nomeItem+"</span><b>"+calculoSaldo[nomeItem].toFixed(2)+"</b></div>";
        listaEstoque.appendChild(cardEstoque);
    }
}

function confirmarBaixaEstoque() {
    var nomeSel = document.getElementById('sel-insumo-baixa').value;
    var qtdUso = parseFloat(document.getElementById('qtd-uso-insumo').value);
    if(nomeSel && qtdUso) {
        dadosFazenda.baixas.push({ nome: nomeSel, quantidade: qtdUso, data: new Date().toISOString() });
        salvarDados();
        renderizarEstoque();
        document.getElementById('qtd-uso-insumo').value = "";
    }
}

function exportarExcel() {
    var calculoSaldo = {};
    for(var i=0; i<dadosFazenda.compras.length; i++) {
        var c = dadosFazenda.compras[i];
        calculoSaldo[c.nome] = (calculoSaldo[c.nome] || 0) + c.quantidade;
    }
    for(var j=0; j<dadosFazenda.baixas.length; j++) {
        var b = dadosFazenda.baixas[j];
        if(calculoSaldo[b.nome]) { calculoSaldo[b.nome] -= b.quantidade; }
    }
    
    var arrayDados = [];
    for(var n in calculoSaldo) {
        arrayDados.push({ "Produto/Insumo": n, "Saldo Atual": calculoSaldo[n] });
    }
    
    var planilha = XLSX.utils.json_to_sheet(arrayDados);
    var livro = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(livro, planilha, "Estoque");
    XLSX.writeFile(livro, "estoque_fazenda_pro.xlsx");
}

// FUNÇÃO: EQUIPE
function registrarAtividadeEquipe() {
    var nomeF = document.getElementById('input-func-nome').value;
    var tarefaF = document.getElementById('input-func-tarefa').value;
    if(nomeF !== "" && tarefaF !== "") {
        dadosFazenda.equipe.push({ nome: nomeF, tarefa: tarefaF, data: new Date().toLocaleString() });
        salvarDados();
        renderizarEquipe();
        document.getElementById('input-func-tarefa').value = "";
    }
}

function renderizarEquipe() {
    var containerEquipe = document.getElementById('lista-atividades-equipe');
    containerEquipe.innerHTML = "";
    var atividades = dadosFazenda.equipe.slice(-10).reverse();
    
    for(var i=0; i<atividades.length; i++) {
        var a = atividades[i];
        var cardAtividade = document.createElement('div');
        cardAtividade.className = "card";
        cardAtividade.innerHTML = "<b>"+a.nome+"</b><br><small>"+a.tarefa+"</small><br><span style='font-size:10px; color:gray'>"+a.data+"</span>";
        containerEquipe.appendChild(cardAtividade);
    }
}

function atualizarPainel() {
    document.getElementById('info-dash').innerText = "Total de itens comprados: " + dadosFazenda.compras.length;
}

function gerarIconeApp() {
  try {
    var can=document.createElement('canvas'); can.width=512; can.height=512;
    var ctx=can.getContext('2d');
    ctx.fillStyle='#2a5c1f'; ctx.fillRect(0,0,512,512);
    ctx.fillStyle='#fff'; ctx.font='bold 300px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🚜', 256, 256);
    var linkIco=document.getElementById('pwa-icon');
    if(linkIco) linkIco.href=can.toDataURL();
  } catch(e) {}
}
</script>
</body>
</html>
