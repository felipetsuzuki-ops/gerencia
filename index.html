<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fazenda Pro - Gestão</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>

    <style>
        :root {
            --g: #2a5c1f; --gl: #e8f5e2; --tx: #1a1f16; --tx2: #6b7566; --br: #e0e5db;
            --st: env(safe-area-inset-top, 20px); --sb: env(safe-area-inset-bottom, 20px);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f2f4f0; color: var(--tx); height: 100vh; overflow: hidden; }
        
        #splash { position: fixed; inset: 0; z-index: 999; background: var(--g); display: flex; align-items: center; justify-content: center; transition: 0.4s; }
        #splash.hide { opacity: 0; pointer-events: none; }

        #app { height: 100vh; display: flex; flex-direction: column; }
        .topbar { background: var(--g); padding: var(--st) 18px 14px; color: #fff; flex-shrink: 0; }
        
        #pages { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
        .page { display: none; } .page.active { display: block; }

        .card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn { background: var(--g); color: #fff; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 8px; }
        .btn-sec { background: #5d7a54; }
        .btn-xls { background: #1d6f42; }

        .bnav { background: #fff; border-top: 1px solid var(--br); display: flex; padding-bottom: var(--sb); flex-shrink: 0; }
        .nb { flex: 1; padding: 12px 5px; border: none; background: none; font-size: 10px; color: #a8b0a2; text-align: center; }
        .nb.active { color: var(--g); font-weight: bold; }
        .ni { font-size: 20px; display: block; margin-bottom: 2px; }

        .fi, .fsel { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid var(--br); border-radius: 10px; background: #f9f9f9; font-size: 15px; }
        .lrow { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .badge { padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        .bg-ok { background: var(--gl); color: var(--g); }
    </style>
</head>
<body>

<div id="splash">
    <div style="color: white; font-weight: bold; text-align: center;">
        <span style="font-size: 40px;">🚜</span><br>Fazenda Pro
    </div>
</div>

<div id="app">
    <div class="topbar"><h2 id="tt">Início</h2></div>

    <div id="pages">
        <div id="pg-dash" class="page active">
            <div class="card" id="resumo-total">Carregando...</div>
            <div class="card">
                <h3>Ações Rápidas</h3>
                <button class="btn btn-xls" onclick="exportarEstoqueExcel()">📊 Extrair Estoque (Excel)</button>
            </div>
        </div>

        <div id="pg-compras" class="page">
            <div class="card">
                <h3>Importar Nota (XML)</h3>
                <input type="file" id="xml-file" accept=".xml" style="display:none" onchange="lerXML()">
                <button class="btn" onclick="document.getElementById('xml-file').click()">📄 Selecionar Arquivo XML</button>
            </div>
            <div id="lista-compras"></div>
        </div>

        <div id="pg-estoque" class="page">
            <div class="card">
                <h3>Baixa de Insumo</h3>
                <select id="sel-insumo" class="fsel"></select>
                <input type="number" id="qtd-uso" class="fi" placeholder="Qtd usada">
                <button class="btn" onclick="baixarEstoque()">Confirmar Baixa</button>
            </div>
            <div id="lista-estoque"></div>
        </div>

        <div id="pg-func" class="page">
            <div class="card">
                <h3>Registrar Atividade</h3>
                <input type="text" id="f-nome" class="fi" placeholder="Nome do Funcionário">
                <input type="text" id="f-tarefa" class="fi" placeholder="Tarefa (ex: Plantio, Cerca)">
                <button class="btn btn-sec" onclick="addAtividade()">Salvar Registro</button>
            </div>
            <div id="lista-atividades"></div>
        </div>
    </div>

    <nav class="bnav">
        <button class="nb active" onclick="nav('dash', this)"><span class="ni">📊</span>Painel</button>
        <button class="nb" onclick="nav('compras', this)"><span class="ni">🛒</span>Compras</button>
        <button class="nb" onclick="nav('estoque', this)"><span class="ni">📦</span>Estoque</button>
        <button class="nb" onclick="nav('func', this)"><span class="ni">👥</span>Equipe</button>
    </nav>
</div>

<script>
// Banco de Dados Local
let db = JSON.parse(localStorage.getItem('fazenda_v2') || '{"compras":[], "usos":[], "atividades":[]}');
const salvar = () => localStorage.setItem('fazenda_v2', JSON.stringify(db));

window.onload = () => {
    renderDash();
    setTimeout(() => { document.getElementById('splash').classList.add('hide'); }, 800);
};

function nav(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
    document.getElementById('pg-' + id).classList.add('active');
    el.classList.add('active');
    document.getElementById('tt').innerText = el.innerText.replace(/[^\w\s]/gi, '');
    
    if(id === 'compras') renderCompras();
    if(id === 'estoque') renderEstoque();
    if(id === 'func') renderAtividades();
}

// COMPRAS POR XML (GRÁTIS)
function lerXML() {
    const file = document.getElementById('xml-file').files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const xml = new DOMParser().parseFromString(e.target.result, "text/xml");
        const itens = xml.getElementsByTagName("det");
        for(let i=0; i<itens.length; i++) {
            db.compras.push({
                id: Date.now() + i,
                nome: itens[i].getElementsByTagName("xProd")[0]?.textContent || "Item",
                qtd: parseFloat(itens[i].getElementsByTagName("qCom")[0]?.textContent || 0),
                data: new Date().toLocaleDateString()
            });
        }
        salvar(); renderCompras(); alert("Nota Importada!");
    };
    reader.readAsText(file);
}

function renderCompras() {
    const cont = document.getElementById('lista-compras');
    cont.innerHTML = db.compras.slice(-10).reverse().map(c => `
        <div class="card"><div class="lrow"><span>${c.nome}</span><b>${c.qtd} un</b></div></div>
    `).join('') || '<p style="text-align:center; padding:20px;">Nenhuma nota importada.</p>';
}

// ESTOQUE E EXCEL
function renderEstoque() {
    const saldos = {};
    db.compras.forEach(c => saldos[c.nome] = (saldos[c.nome] || 0) + c.qtd);
    db.usos.forEach(u => { if(saldos[u.nome]) saldos[u.nome] -= u.qtd; });

    document.getElementById('sel-insumo').innerHTML = Object.keys(saldos).map(k => `<option value="${k}">${k}</option>`).join('');
    document.getElementById('lista-estoque').innerHTML = Object.keys(saldos).map(k => `
        <div class="lrow"><span>${k}</span><span class="badge bg-ok">${saldos[k].toFixed(2)} un</span></div>
    `).join('');
}

function exportarEstoqueExcel() {
    const saldos = {};
    db.compras.forEach(c => saldos[c.nome] = (saldos[c.nome] || 0) + c.qtd);
    db.usos.forEach(u => { if(saldos[u.nome]) saldos[u.nome] -= u.qtd; });
    
    const data = Object.keys(saldos).map(k => ({ "Insumo": k, "Saldo": saldos[k] }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Estoque");
    XLSX.writeFile(wb, "estoque_fazenda.xlsx");
}

function baixarEstoque() {
    const nome = document.getElementById('sel-insumo').value;
    const qtd = parseFloat(document.getElementById('qtd-uso').value);
    if(!nome || !qtd) return;
    db.usos.push({ nome, qtd, data: new Date().toISOString() });
    salvar(); renderEstoque(); alert("Baixa realizada!");
}

// ATIVIDADES FUNCIONÁRIOS
function addAtividade() {
    const nome = document.getElementById('f-nome').value;
    const tarefa = document.getElementById('f-tarefa').value;
    if(!nome || !tarefa) return;
    db.atividades.push({ nome, tarefa, data: new Date().toLocaleString() });
    salvar();
    document.getElementById('f-tarefa').value = '';
    renderAtividades();
}

function renderAtividades() {
    document.getElementById('lista-atividades').innerHTML = db.atividades.slice(-15).reverse().map(a => `
        <div class="card">
            <b>${a.nome}</b><br>
            <small>${a.tarefa}</small><br>
            <span style="font-size:10px; color:gray">${a.data}</span>
        </div>
    `).join('');
}

function renderDash() {
    document.getElementById('resumo-total').innerHTML = `<h3>Painel Samuel</h3><p>Estoque com ${db.compras.length} entradas registradas.</p>`;
}
</script>
</body>
</html>
